name: Build Windows Executable

on:
  push:
    tags: # Trigger only when a new tag (e.g., v1.0.0) is pushed
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Job to create the executable
  build_windows:
    runs-on: windows-latest # Use a Windows runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Use your desired Python version

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 🔨 Package Application with PyInstaller
      run: pyinstaller --onefile --name watch_growth --icon growth_profile.ico main.py

    - name: 📦 Prepare Release Assets
      run: |
        # Create a clean folder to store final release items
        mkdir release_assets
        
        # Copy the exe into the release folder
        cp dist/watch_growth.exe release_assets/
        
        # Zip only the data folder contents and name it database.zip
        compress-archive -path data/* -destinationpath release_assets/database.zip
      shell: powershell

    - name: ⬆️ Upload Assets as Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Release-Assets
        path: release_assets/

  # 2. Job to create the GitHub Release
  create_release:
    name: Create GitHub Release
    needs: build_windows # Ensures this only runs after the EXE is successfully built
    runs-on: ubuntu-latest # Can use a cheaper Linux runner for the upload/release

    steps:
      - name: ⬇️ Download Release Assets
        uses: actions/download-artifact@v4
        with:
          name: Windows-Release-Assets
          path: ./release_upload/

      - name: 🏷️ Create and Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./release_upload/watch_growth.exe
            ./release_upload/database.zip
          prerelease: false